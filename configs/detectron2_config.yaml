# Hiperparâmetros base do Detectron2 (sobrescreve o YAML do Model Zoo).
# Mapeamento de --model para arquivo do Model Zoo.

model_zoo:
  faster_rcnn: "COCO-Detection/faster_rcnn_R_50_FPN_3x.yaml"
  retinanet: "COCO-Detection/retinanet_R_50_FPN_3x.yaml"
  cascade_rcnn: "Misc/cascade_mask_rcnn_R_50_FPN_3x.yaml"

solver:
  base_lr: 0.0025
  weight_decay: 0.0005
  warmup_iters: 500
  warmup_factor: 0.001
  momentum: 0.9
  gamma: 0.1
  # max_iter é calculado a partir de epochs * imagens / batch
  checkpoint_period: 0  # 0 = calculado a partir de "a cada 3 épocas"

input:
  min_size_train: [640]
  max_size_train: 800
  min_size_test: 640
  max_size_test: 800

dataloader:
  filter_empty_annotations: true

# Early stopping é implementado em código (Detectron2 nativo não tem)
early_stopping:
  patience: 10
  metric: "bbox/AP50"
